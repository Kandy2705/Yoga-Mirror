name: yoga_mirror_rive_demo
description: Rive 2D mannequin driven by MediaPipe-style JSON pose frames.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  rive: ^0.14.9
  file_picker: ^11.0.2
  http: ^1.6.0
  web_socket_channel: ^3.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/rive/yoga_mannequin.riv
