<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status {
      position: absolute;
      left: 0; right: 0; bottom: 8px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font: 12px/1.4 -apple-system, sans-serif;
      pointer-events: none;
      display: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
      "kalidokit": "https://esm.sh/kalidokit@1.1.5"
    }
  }
  </script>
  <script>
  window.addEventListener('error', function(e) {
    var msg = e.message || '';
    if (msg.includes('three') || msg.includes('vrm') || msg.includes('kalidokit') || msg.includes('cdn') || msg.includes('jsdelivr') || msg.includes('esm.sh')) {
      if (window.YogaMirrorBridge && window.YogaMirrorBridge.postMessage) {
        window.YogaMirrorBridge.postMessage(JSON.stringify({
          type: 'error',
          message: 'Failed to load CDN dependency. Check internet.',
          detail: msg
        }));
      }
    }
  }, true);

  window.addEventListener('unhandledrejection', function(e) {
    var msg = e.reason ? (e.reason.message || String(e.reason)) : '';
    if (msg.includes('three') || msg.includes('kalidokit') || msg.includes('vrm')) {
      if (window.YogaMirrorBridge && window.YogaMirrorBridge.postMessage) {
        window.YogaMirrorBridge.postMessage(JSON.stringify({
          type: 'error',
          message: 'Failed to load module dependency. Check internet.',
          detail: msg
        }));
      }
    }
  });
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status"></div>
  <!-- YOGA_VRM_SCRIPT -->
</body>
</html>
